<svg width="100%" height="160" viewBox="0 0 800 160" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
    <linearGradient id="sweepGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0"/>
      <stop offset="50%" stop-color="#a855f7" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#93c5fd"/>
    </linearGradient>
  </defs>

  <rect width="800" height="160" fill="url(#bgGrad)" rx="12"/>

  <rect x="-200" y="0" width="200" height="160" fill="url(#sweepGrad)">
    <animate attributeName="x" from="-200" to="800" dur="4s" repeatCount="indefinite"/>
  </rect>

  <text x="400" y="65" text-anchor="middle" font-family="Fira Code, monospace" font-size="30" font-weight="700" fill="url(#textGrad)">
    Hi, I'm Shreya Robin
    <animate attributeName="opacity" values="0;1;1" keyTimes="0;0.15;1" dur="1s" fill="freeze"/>
  </text>

  <text x="400" y="105" text-anchor="middle" font-family="Fira Code, monospace" font-size="16" fill="#e0e7ff" opacity="0">
    Python • XGBoost • RAG
    <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.02;0.06;0.23;0.25;1" dur="12s" repeatCount="indefinite"/>
  </text>

  <text x="400" y="105" text-anchor="middle" font-family="Fira Code, monospace" font-size="16" fill="#e0e7ff" opacity="0">
    FastAPI • React • Next.js
    <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.25;0.27;0.48;0.5;1" dur="12s" repeatCount="indefinite"/>
  </text>

  <text x="400" y="105" text-anchor="middle" font-family="Fira Code, monospace" font-size="16" fill="#e0e7ff" opacity="0">
    Docker • AWS • PostgreSQL
    <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.5;0.52;0.73;0.75;1" dur="12s" repeatCount="indefinite"/>
  </text>

  <text x="400" y="105" text-anchor="middle" font-family="Fira Code, monospace" font-size="16" fill="#e0e7ff" opacity="0">
    Fluent in Python and C
    <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.75;0.77;0.98;1" dur="12s" repeatCount="indefinite"/>
  </text>

  <line x1="300" y1="125" x2="500" y2="125" stroke="#a855f7" stroke-width="2" stroke-linecap="round" opacity="0.6">
    <animate attributeName="x1" values="300;250;300" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="x2" values="500;550;500" dur="3s" repeatCount="indefinite"/>
  </line>
</svg>
